<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Clientes BuyPass" />
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1ZhXnY35i4ewk-duviq6ilIMGmDhzy0Ui" />
    <link rel="manifest" href="/manifest-consumer.json" />
    <meta name="theme-color" content="#16a34a" />
    <title>Clientes BuyPass</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Narrowing the scope to just the consumer page prevents it from 
          // hijacking the SaaS root URL.
          navigator.serviceWorker.register('/sw.js', { scope: '/consumer.html' })
            .then(reg => console.log('BuyPass Consumer SW registered!', reg))
            .catch(err => console.error('Consumer SW failure:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/consumer-main.tsx"></script>
  </body>
</html>
