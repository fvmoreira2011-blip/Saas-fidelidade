<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BuyPass" />
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1ZhXnY35i4ewk-duviq6ilIMGmDhzy0Ui" />
    <meta name="theme-color" content="#16a34a" />
    <link rel="manifest" href="/manifest-saas.json" />
    <title>BuyPass - Gestão de Fidelidade</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // SaaS has the root scope
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('BuyPass SaaS SW registered!', reg))
            .catch(err => console.error('SaaS SW failure:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
